name: Daily Bike Update

on:
schedule:
- cron: “0 5 * * *”
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
  - name: Run scraper
    run: python scraper.py
  - name: Commit changes
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com
      git pull --rebase
      git add data.json
      git commit -m "update bikes" || echo "No changes to commit"
      git push