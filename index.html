<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Radar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">

    <h1>🚲 Bike Radar</h1>

    <p class="subtitle">
        Carbon Gravel & Rennrad Deals
    </p>

    <div class="stats">

        <div class="stat">
            <span id="bikeCount">0</span>
            <small>Bikes</small>
        </div>

        <div class="stat">
            <span id="avgDiscount">0%</span>
            <small>Ø Rabatt</small>
        </div>

    </div>

</div>

<div class="filters">

    <label>
        <input
            type="checkbox"
            id="carbonOnly"
            checked>
        Nur Carbon
    </label>

    <br><br>

    <label>
        <input
            type="checkbox"
            id="gravelOnly"
            checked>
        Nur Gravel
    </label>

    <br><br>

    <label>
        Max Preis:
        <input
            type="number"
            id="maxPrice"
            value="3000">
    </label>

    <br><br>

    <strong>Quellen</strong>

    <br><br>

    <label>
        <input
            type="checkbox"
            id="saleSource"
            checked>
        Canyon Sale
    </label>

    <br>

    <label>
        <input
            type="checkbox"
            id="outletSource"
            checked>
        Canyon Outlet
    </label>

</div>

<div
    id="bikeCards"
    class="cards">
</div>

<script src="script.js"></script>

</body>
</html>
