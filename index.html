<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Radar</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="header">

        <div>
            <h1>🚲 Bike Radar</h1>
            <p class="subtitle">
                Carbon Gravel & Rennrad Deals
            </p>
        </div>

        <div class="stats">

            <div class="stat">
                <span id="bikeCount">0</span>
                <small>Bikes</small>
            </div>

            <div class="stat">
                <span id="avgDiscount">0%</span>
                <small>Ø Rabatt</small>
            </div>

        </div>

    </div>

    <div class="filters">

        <label>
            <input type="checkbox" id="carbonOnly" checked>
            Nur Carbon
        </label>

    </div>

    <div class="table-container">

        <table>

            <thead>

                <tr>
                    <th onclick="sortBy('deal_score')">
                        🔥 Score
                    </th>

                    <th>
                        Modell
                    </th>

                    <th onclick="sortBy('price')">
                        Preis
                    </th>

                    <th>
                        Vorher
                    </th>

                    <th onclick="sortBy('discount')">
                        Rabatt
                    </th>

                    <th onclick="sortBy('weight')">
                        Gewicht
                    </th>

                    <th>
                        Schaltung
                    </th>

                    <th>
                        Händler
                    </th>

                </tr>

            </thead>

            <tbody id="bikeTable"></tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
